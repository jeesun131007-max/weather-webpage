<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌦️ Weather Dashboard</h1>

    <div class="grid">
      <div class="card">
        <h2>🌡️ Temperature</h2>
        <p id="temp">-- °C</p>
      </div>

      <div class="card">
        <h2>💧 Humidity</h2>
        <p id="hum">-- %</p>
      </div>

      <div class="card">
        <h2>🌪️ Pressure</h2>
        <p id="pres">-- hPa</p>
      </div>

      <div class="card">
        <h2>🌧️ Rain</h2>
        <p id="rain">--</p>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
